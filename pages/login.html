<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập – EngPro</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#002045', 'primary-container': '#1a365d',
            secondary: '#0061a5', accent: '#e07b28',
            surface: '#f7fafc', 'surface-low': '#f1f4f6',
            'on-surface': '#181c1e', 'on-surface-variant': '#43474e',
            outline: '#74777f', 'outline-variant': '#c4c6cf',
            error: '#ba1a1a',
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        },
      },
    };
  </script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-surface min-h-screen flex flex-col">

  <!-- Top bar -->
  <div class="w-full px-6 py-4">
    <a href="../index.html" class="flex items-center gap-2 w-fit">
      <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
        <span class="material-symbols-outlined text-white text-lg">school</span>
      </div>
      <span class="text-lg font-bold text-primary">EngPro</span>
    </a>
  </div>

  <!-- Main -->
  <main class="flex-grow flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md">

      <!-- Card -->
      <div class="bg-white rounded-2xl border border-outline-variant/40 shadow-sm p-8">

        <div class="text-center mb-7">
          <h1 class="text-2xl font-bold text-primary">Chào mừng trở lại</h1>
          <p class="text-sm text-on-surface-variant mt-1">Đăng nhập để tiếp tục học tập</p>
        </div>

        <!-- Error alert -->
        <div id="error-alert" class="hidden mb-5 bg-red-50 border border-red-200 rounded-xl px-4 py-3 flex items-center gap-2">
          <span class="material-symbols-outlined text-error text-sm">error</span>
          <p class="text-xs text-error font-medium" id="error-msg">Email hoặc mật khẩu không đúng.</p>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">

          <!-- Email -->
          <div>
            <label class="block text-xs font-semibold text-on-surface mb-1.5 uppercase tracking-wider">Email</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">mail</span>
              <input id="email" type="email" placeholder="email@example.com" required
                class="w-full pl-10 pr-4 py-3 text-sm border border-outline-variant rounded-xl focus:border-secondary focus:ring-2 focus:ring-secondary/20 outline-none transition-all bg-white" />
            </div>
          </div>

          <!-- Password -->
          <div>
            <div class="flex items-center justify-between mb-1.5">
              <label class="text-xs font-semibold text-on-surface uppercase tracking-wider">Mật khẩu</label>
              <a href="#" class="text-xs text-secondary hover:underline">Quên mật khẩu?</a>
            </div>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">lock</span>
              <input id="password" type="password" placeholder="Nhập mật khẩu" required
                class="w-full pl-10 pr-12 py-3 text-sm border border-outline-variant rounded-xl focus:border-secondary focus:ring-2 focus:ring-secondary/20 outline-none transition-all bg-white" />
              <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors">
                <span class="material-symbols-outlined text-lg" id="eye-icon">visibility</span>
              </button>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" id="submit-btn"
            class="w-full bg-primary text-white font-semibold py-3 rounded-xl hover:opacity-90 transition-opacity text-sm flex items-center justify-center gap-2 mt-2">
            <span class="material-symbols-outlined text-base">login</span>
            Đăng nhập
          </button>

        </form>

        <p class="text-center text-xs text-on-surface-variant mt-6">
          Chưa có tài khoản?
          <a href="register.html" class="text-secondary font-semibold hover:underline">Đăng ký ngay</a>
        </p>
      </div>


    </div>
  </main>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      // Loading state
      const btn = document.getElementById('submit-btn');
      btn.innerHTML = '<span class="material-symbols-outlined text-base animate-spin">sync</span> Đang đăng nhập...';
      btn.disabled = true;
      hideError();

      try {
        const res  = await fetch('/api/auth/login', {
          method:      'POST',
          headers:     { 'Content-Type': 'application/json' },
          credentials: 'include',
          body:        JSON.stringify({ email, password }),
        });
        const json = await res.json();

        if (!json.success) {
          showError(json.message || 'Email hoặc mật khẩu không đúng');
          resetBtn();
          return;
        }

        // Lưu thông tin user để UI sử dụng
        sessionStorage.setItem('engpro_user', JSON.stringify(json.data.user));
        window.location.href = json.data.redirect;

      } catch (err) {
        showError('Không thể kết nối đến server. Kiểm tra XAMPP đã chạy chưa.');
        resetBtn();
      }
    }

    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-alert').classList.remove('hidden');
      document.getElementById('email').classList.add('border-error');
      document.getElementById('password').classList.add('border-error');
    }

    function hideError() {
      document.getElementById('error-alert').classList.add('hidden');
      document.getElementById('email').classList.remove('border-error');
      document.getElementById('password').classList.remove('border-error');
    }

    function resetBtn() {
      const btn = document.getElementById('submit-btn');
      btn.innerHTML = '<span class="material-symbols-outlined text-base">login</span> Đăng nhập';
      btn.disabled = false;
    }

    function togglePassword() {
      const inp  = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.textContent = 'visibility_off';
      } else {
        inp.type = 'password';
        icon.textContent = 'visibility';
      }
    }
  </script>
</body>
</html>
